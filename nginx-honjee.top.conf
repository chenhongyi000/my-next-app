# Nginx reverse proxy for honjee.top
# 部署路径: /etc/nginx/sites-available/honjee.top
# 启用: ln -s /etc/nginx/sites-available/honjee.top /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name honjee.top www.honjee.top;

    # 日志
    access_log /var/log/nginx/honjee.top_access.log;
    error_log  /var/log/nginx/honjee.top_error.log;

    # 反向代理到 Next.js 应用 (PM2 管理, 端口 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (Next.js HMR / 热更新, 生产环境也可保留)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # 静态资源直接由 Nginx 提供 (性能更好)
    location /_next/static {
        alias /opt/nextjs-app/.next/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public {
        alias /opt/nextjs-app/public;
        expires 30d;
    }
}

