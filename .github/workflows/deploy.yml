name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. 安装依赖 + 构建
      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 4. 准备部署包
      - name: Prepare Deploy Package
        run: |
          mkdir -p deploy-package
          cp -r .next/standalone/* deploy-package/
          mkdir -p deploy-package/.next/static
          cp -r .next/static deploy-package/.next/
          cp -r public deploy-package/ 2>/dev/null || true
          cp ecosystem.config.js deploy-package/

      # 5. 安装 sshpass
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      # 6. SSH 创建目录并授权
      - name: Prepare Server Directory
        run: |
          SSHPASS='${{ secrets.SERVER_PASSWORD }}' sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            '${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}' \
            'sudo mkdir -p /opt/nextjs-app && sudo chown -R $USER:$USER /opt/nextjs-app'

      # 7. SCP 传输文件
      - name: SCP Deploy Package
        run: |
          SSHPASS='${{ secrets.SERVER_PASSWORD }}' sshpass -e scp \
            -o StrictHostKeyChecking=accept-new \
            -r deploy-package/* \
            '${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}':/opt/nextjs-app/

      # 8. SSH 重启服务
      - name: Restart App
        run: |
          SSHPASS='${{ secrets.SERVER_PASSWORD }}' sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            '${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}' \
            '
              cd /opt/nextjs-app

              if ! command -v pm2 &> /dev/null; then
                sudo npm install -g pm2
              fi

              pm2 restart ecosystem.config.js 2>/dev/null || pm2 start ecosystem.config.js

              pm2 save
            '
