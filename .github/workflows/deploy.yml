name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. 安装依赖 + 构建
      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 4. 准备部署包
      - name: Prepare Deploy Package
        run: |
          mkdir -p deploy-package
          cp -r .next/standalone/* deploy-package/
          mkdir -p deploy-package/.next/static
          cp -r .next/static deploy-package/.next/
          cp -r public deploy-package/ 2>/dev/null || true

      # 5. 写入 SSH 密钥并传输
      - name: Deploy Package to Server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          scp -P "${PORT:-22}" \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -r deploy-package/* \
            root@$HOST:/opt/nextjs-app/

      # 6. SSH 重启服务
      - name: Restart App on Server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh -p "${PORT:-22}" \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            root@$HOST \
            '
              cd /opt/nextjs-app

              if ! command -v pm2 &> /dev/null; then
                npm install -g pm2
              fi

              pm2 restart nextjs-app 2>/dev/null || pm2 start server.js --name nextjs-app

              pm2 save
            '
